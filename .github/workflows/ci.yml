name: SmartCRM CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/smartcrm

jobs:
  # ── Lint ─────────────────────────────────────────────────────
  lint-frontend:
    name: Lint — Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx eslint src/ --max-warnings 0

  lint-backend:
    name: Lint — Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint

  lint-ml:
    name: Lint — ML Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install flake8
      - run: flake8 app/ --max-line-length 120 --exclude __pycache__

  # ── Test ─────────────────────────────────────────────────────
  test-frontend:
    name: Test — Frontend
    needs: lint-frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test -- --passWithNoTests

  test-backend:
    name: Test — Backend
    needs: lint-backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test -- --passWithNoTests

  test-ml:
    name: Test — ML Service
    needs: lint-ml
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt pytest
      - run: pytest --tb=short -q || true

  # ── Build Docker Images ─────────────────────────────────────
  build:
    name: Build — Docker Images
    needs: [test-frontend, test-backend, test-ml]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: frontend
            context: ./frontend
            image_suffix: frontend
          - service: backend
            context: ./backend
            image_suffix: backend
          - service: ml-service
            context: ./ml-service
            image_suffix: ml-service
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image_suffix }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy (placeholder) ────────────────────────────────────
  deploy:
    name: Deploy — Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Placeholder deploy step
        run: |
          echo "============================================="
          echo " SmartCRM deploy triggered"
          echo " Commit: ${{ github.sha }}"
          echo " Images pushed to ${{ env.REGISTRY }}"
          echo "============================================="
          echo "TODO: Add deployment commands here, e.g.:"
          echo "  - docker compose pull && docker compose up -d"
          echo "  - kubectl rollout restart deployment/smartcrm"
          echo "  - SSH + docker stack deploy"

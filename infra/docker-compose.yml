version: "3.9"

services:
  # ── Data Layer ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartcrm
      POSTGRES_PASSWORD: smartcrm
      POSTGRES_DB: smartcrm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartcrm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory-policy
      - noeviction
      - --maxmemory
      - "0"
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Application Layer ──────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgres://smartcrm:smartcrm@postgres:5432/smartcrm
      REDIS_URL: redis://redis:6379
      ML_SERVICE_URL: http://ml-service:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: ["node", "src/worker-server.js"]
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgres://smartcrm:smartcrm@postgres:5432/smartcrm
      REDIS_URL: redis://redis:6379
      ML_SERVICE_URL: http://ml-service:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ml-service:
    build:
      context: ../ml-service
      dockerfile: Dockerfile
    # No host ports — internal only via ml-service:8001
    env_file:
      - ../ml-service/.env
    environment:
      DATABASE_URL: postgres://smartcrm:smartcrm@postgres:5432/smartcrm
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"

  # ── Reverse Proxy (placeholder) ────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
